spring.application.name=licensing

# DataSource

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bnr}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:26irakiza}

spring.datasource.hikari.initialization-fail-timeout=0

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
debug=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dialect (Hibernate 6 + MySQL 8)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Naming strategy (Spring Boot 4 / Hibernate 6 compatible)
# spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

